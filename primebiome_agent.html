<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeBiome AI Sales Agent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --accent: #3fb950;
    --accent2: #58a6ff;
    --gold: #d4a017;
    --text: #e6edf3;
    --muted: #8b949e;
    --user-bubble: #1f3a5f;
    --agent-bubble: #1a2f1a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .agent-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a4d1a, #3fb950);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    position: relative;
  }

  .online-dot {
    position: absolute;
    bottom: 1px;
    right: 1px;
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 50%;
    border: 2px solid var(--surface);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-info h2 {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  .header-info p {
    font-size: 12px;
    color: var(--accent);
  }

  .header-badge {
    margin-left: auto;
    background: rgba(63, 185, 80, 0.1);
    border: 1px solid rgba(63, 185, 80, 0.3);
    color: var(--accent);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  /* Product quick info bar */
  .product-bar {
    background: linear-gradient(90deg, rgba(212, 160, 23, 0.08), rgba(63, 185, 80, 0.08));
    border-bottom: 1px solid var(--border);
    padding: 8px 20px;
    display: flex;
    gap: 20px;
    align-items: center;
    flex-shrink: 0;
    overflow-x: auto;
  }

  .product-bar::-webkit-scrollbar { display: none; }

  .pbar-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11.5px;
    color: var(--muted);
    white-space: nowrap;
  }

  .pbar-item span:first-child { font-size: 14px; }

  .pbar-item strong { color: var(--text); }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message {
    display: flex;
    gap: 10px;
    max-width: 85%;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .message.agent { align-self: flex-start; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg-avatar.agent-av {
    background: linear-gradient(135deg, #1a4d1a, #3fb950);
  }

  .msg-avatar.user-av {
    background: linear-gradient(135deg, #1f3a5f, #58a6ff);
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
  }

  .message.agent .bubble {
    background: var(--agent-bubble);
    border: 1px solid rgba(63, 185, 80, 0.2);
    border-top-left-radius: 4px;
  }

  .message.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(88, 166, 255, 0.2);
    border-top-right-radius: 4px;
  }

  .bubble .highlight {
    color: var(--accent);
    font-weight: 500;
  }

  .bubble .gold {
    color: var(--gold);
    font-weight: 500;
  }

  .bubble a {
    color: var(--accent2);
    text-decoration: none;
    font-weight: 500;
  }

  .bubble a:hover { text-decoration: underline; }

  .product-card {
    margin-top: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }

  .product-card h4 {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    margin-bottom: 8px;
    font-size: 15px;
  }

  .ingredient-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 8px 0;
  }

  .ingredient-tag {
    background: rgba(63, 185, 80, 0.1);
    border: 1px solid rgba(63, 185, 80, 0.25);
    color: var(--accent);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 10px;
  }

  .price-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }

  .price-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    text-align: center;
    font-size: 12px;
  }

  .price-item.best {
    border-color: var(--gold);
    background: rgba(212, 160, 23, 0.05);
  }

  .price-item .bottles { font-weight: 600; color: var(--text); font-size: 13px; }
  .price-item .price-val { color: var(--accent); font-weight: 700; font-size: 15px; margin: 2px 0; }
  .price-item .old-price { color: var(--muted); text-decoration: line-through; font-size: 11px; }

  .cta-btn {
    display: inline-block;
    margin-top: 10px;
    background: linear-gradient(135deg, #2d6a2d, #3fb950);
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 13px;
    text-decoration: none;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }

  .cta-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 15px rgba(63, 185, 80, 0.3);
  }

  /* Quick replies */
  .quick-replies {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 0 20px 10px;
    flex-shrink: 0;
  }

  .qr-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12.5px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .qr-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(63, 185, 80, 0.05);
  }

  /* Input */
  .input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within { border-color: rgba(63, 185, 80, 0.4); }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    resize: none;
    max-height: 100px;
    line-height: 1.5;
  }

  #user-input::placeholder { color: var(--muted); }

  .send-btn {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, #2d6a2d, #3fb950);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover { transform: scale(1.05); box-shadow: 0 3px 12px rgba(63, 185, 80, 0.3); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 18px; height: 18px; fill: white; }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    padding: 14px 16px;
    align-items: center;
  }

  .typing span {
    width: 7px;
    height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    margin-left: auto;
    transition: all 0.2s;
  }

  .reset-btn:hover { border-color: var(--muted); color: var(--text); }

  @media (max-width: 480px) {
    .price-grid { grid-template-columns: 1fr; }
    .message { max-width: 95%; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="agent-avatar">
    🌿
    <div class="online-dot"></div>
  </div>
  <div class="header-info">
    <h2>Alex — PrimeBiome Specialist</h2>
    <p>Health & Wellness Expert • Online Now</p>
  </div>
  <div class="header-badge">AI Powered</div>
</div>

<div class="product-bar">
  <div class="pbar-item"><span>✅</span> <strong>Natural Formula</strong></div>
  <div class="pbar-item"><span>🌱</span> <strong>Non-GMO</strong></div>
  <div class="pbar-item"><span>🛡️</span> <strong>60-Day Guarantee</strong></div>
  <div class="pbar-item"><span>⭐</span> <strong>19,479 Reviews</strong></div>
  <div class="pbar-item"><span>🚚</span> <strong>Free US Shipping</strong></div>
</div>

<div class="chat-area" id="chat"></div>

<div class="quick-replies" id="quick-replies">
  <button class="qr-btn" onclick="sendQuick('What is PrimeBiome?')">What is PrimeBiome?</button>
  <button class="qr-btn" onclick="sendQuick('What are the ingredients?')">Ingredients</button>
  <button class="qr-btn" onclick="sendQuick('How much does it cost?')">Pricing</button>
  <button class="qr-btn" onclick="sendQuick('Does it really work?')">Does it work?</button>
  <button class="qr-btn" onclick="sendQuick('What are the benefits?')">Benefits</button>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="user-input" placeholder="Ask me anything about PrimeBiome..." rows="1"></textarea>
  </div>
  <button class="send-btn" id="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
const AFFILIATE_LINK = "https://bit.ly/3NbSfJ6";

const PRODUCT_CONTEXT = `
You are Alex, a friendly and knowledgeable health & wellness sales specialist promoting PrimeBiome.

PRODUCT DETAILS:
- Name: PrimeBiome
- Type: Probiotic gummy (1 per day)
- Purpose: Supports skin-gut cell turnover, promotes youthful skin & healthy gut microbiome
- Key Benefits: Better skin health, younger appearance, digestive support, healthy weight support, dermal balance
- Certifications: Natural Formula, Non-GMO, No Stimulants, Easy to Use
- Reviews: 19,479 positive reviews
- Guarantee: 100% satisfaction 60-day money-back guarantee

INGREDIENTS: B. Coagulans, Babchi, Dandelion, Fennel, Inulin, Fenugreek, Lemon Balm, Organic Ceylon Ginger, Organic Lion's Mane, Slippery Elm Bark

PRICING:
- 2 bottles (60-day supply): $79/bottle = $158 total (+ $9.99 shipping)
- 3 bottles (90-day supply): $69/bottle = $207 total (FREE shipping) — Most Popular
- 6 bottles (180-day supply): $49/bottle = $294 total (FREE shipping + 3 free bonus e-books) — BEST VALUE

FREE BONUSES (with 6-bottle order):
1. "See You Never, Cellulite!" e-book (retail $55)
2. "Hello, Dazzling Hair!" e-book (retail $54)
3. "White In a Flash!" e-book (retail $54)

SHIPPING:
- USA: FREE, 5-7 business days
- Canada/UK/Ireland/Australia/NZ: $15.95, 10-15 business days

AFFILIATE LINK: ${AFFILIATE_LINK}

YOUR ROLE:
- Be warm, helpful, and persuasive but not pushy
- Answer questions about the product confidently
- Naturally steer the conversation toward purchase
- Recommend the 6-bottle package for best value
- Always include the affiliate link when discussing purchase
- Speak in English
- Keep responses concise (2-4 short paragraphs max)
- Use emojis sparingly for warmth
- If asked about health concerns, remind them to consult a doctor but highlight the natural formula and guarantee
- Address objections with the 60-day money-back guarantee
- DO NOT make false medical claims or diagnose conditions
`;

let conversationHistory = [];
let isTyping = false;

function addMessage(role, htmlContent) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  
  const avatar = document.createElement('div');
  avatar.className = `msg-avatar ${role === 'agent' ? 'agent-av' : 'user-av'}`;
  avatar.textContent = role === 'agent' ? '🌿' : '👤';
  
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = htmlContent;
  
  div.appendChild(avatar);
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'message agent';
  div.id = 'typing-indicator';
  
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar agent-av';
  avatar.textContent = '🌿';
  
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<span></span><span></span><span></span>';
  
  div.appendChild(avatar);
  div.appendChild(typing);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function sendQuick(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

async function sendMessage() {
  if (isTyping) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;
  
  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  
  conversationHistory.push({ role: 'user', content: text });
  
  isTyping = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();
  
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: PRODUCT_CONTEXT,
        messages: conversationHistory
      })
    });
    
    const data = await response.json();
    const replyText = data.content?.[0]?.text || "I'm sorry, I couldn't process that. Please try again.";
    
    conversationHistory.push({ role: 'assistant', content: replyText });
    
    removeTyping();
    // Convert markdown-style bold to html and add link
    let formatted = replyText
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(new RegExp(AFFILIATE_LINK.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'), `<a href="${AFFILIATE_LINK}" target="_blank">👉 Get PrimeBiome Now</a>`)
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>');
    
    addMessage('agent', formatted);
    
  } catch (err) {
    removeTyping();
    addMessage('agent', "I'm having a moment — please try again! 😊");
  }
  
  isTyping = false;
  document.getElementById('send-btn').disabled = false;
}

// Auto-resize textarea
document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

document.getElementById('user-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Initial greeting
window.onload = () => {
  setTimeout(() => {
    addMessage('agent', `Hi there! 👋 I'm Alex, your PrimeBiome wellness specialist.<br><br>
I'm here to help you discover <strong class="highlight">PrimeBiome</strong> — the probiotic gummy that's transforming the way people care for their skin and gut health from the inside out.<br><br>
Whether you're curious about the ingredients, benefits, or pricing — I've got all the answers. What would you like to know? 🌿`);
    
    conversationHistory.push({
      role: 'assistant',
      content: "Hi there! 👋 I'm Alex, your PrimeBiome wellness specialist. I'm here to help you discover PrimeBiome — the probiotic gummy that's transforming the way people care for their skin and gut health from the inside out. Whether you're curious about the ingredients, benefits, or pricing — I've got all the answers. What would you like to know? 🌿"
    });
  }, 500);
};
</script>
</body>
</html>
