<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeBiome AI Sales Agent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
  :root {
    --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--border:#30363d;
    --accent:#3fb950;--accent2:#58a6ff;--gold:#d4a017;--text:#e6edf3;
    --muted:#8b949e;--user-bubble:#1f3a5f;--agent-bubble:#1a2f1a;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
  .agent-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#1a4d1a,#3fb950);display:flex;align-items:center;justify-content:center;font-size:18px;position:relative}
  .online-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:var(--accent);border-radius:50%;border:2px solid var(--surface);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .header-info h2{font-family:'Playfair Display',serif;font-size:16px;font-weight:700}
  .header-info p{font-size:12px;color:var(--accent)}
  .header-badge{margin-left:auto;background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);color:var(--accent);font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500}
  .product-bar{background:linear-gradient(90deg,rgba(212,160,23,.08),rgba(63,185,80,.08));border-bottom:1px solid var(--border);padding:8px 20px;display:flex;gap:20px;align-items:center;flex-shrink:0;overflow-x:auto}
  .product-bar::-webkit-scrollbar{display:none}
  .pbar-item{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted);white-space:nowrap}
  .pbar-item strong{color:var(--text)}
  .chat-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
  .chat-area::-webkit-scrollbar{width:4px}
  .chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .message{display:flex;gap:10px;max-width:85%;animation:fadeUp .3s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .message.user{align-self:flex-end;flex-direction:row-reverse}
  .message.agent{align-self:flex-start}
  .msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px}
  .msg-avatar.agent-av{background:linear-gradient(135deg,#1a4d1a,#3fb950)}
  .msg-avatar.user-av{background:linear-gradient(135deg,#1f3a5f,#58a6ff)}
  .bubble{padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.6}
  .message.agent .bubble{background:var(--agent-bubble);border:1px solid rgba(63,185,80,.2);border-top-left-radius:4px}
  .message.user .bubble{background:var(--user-bubble);border:1px solid rgba(88,166,255,.2);border-top-right-radius:4px}
  .bubble a{color:var(--accent2);text-decoration:none;font-weight:500}
  .bubble a:hover{text-decoration:underline}
  .quick-replies{display:flex;gap:8px;flex-wrap:wrap;padding:0 20px 10px;flex-shrink:0}
  .qr-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:20px;font-size:12.5px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
  .qr-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(63,185,80,.05)}
  .input-area{background:var(--surface);border-top:1px solid var(--border);padding:14px 16px;display:flex;gap:10px;align-items:flex-end;flex-shrink:0}
  .input-wrap{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;display:flex;align-items:center;transition:border-color .2s}
  .input-wrap:focus-within{border-color:rgba(63,185,80,.4)}
  #user-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;resize:none;max-height:100px;line-height:1.5}
  #user-input::placeholder{color:var(--muted)}
  .send-btn{width:42px;height:42px;background:linear-gradient(135deg,#2d6a2d,#3fb950);border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
  .send-btn:hover{transform:scale(1.05);box-shadow:0 4px 15px rgba(63,185,80,.3)}
  .send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .send-btn svg{width:18px;height:18px;fill:white}
  .typing{display:flex;gap:4px;padding:14px 16px;align-items:center}
  .typing span{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:bounce 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}
  .typing span:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
</style>
</head>
<body>
<div class="header">
  <div class="agent-avatar">🌿<div class="online-dot"></div></div>
  <div class="header-info">
    <h2>Alex — PrimeBiome Specialist</h2>
    <p>Health & Wellness Expert • Online Now</p>
  </div>
  <div class="header-badge">AI Powered</div>
</div>
<div class="product-bar">
  <div class="pbar-item"><span>✅</span><strong>Natural Formula</strong></div>
  <div class="pbar-item"><span>🌱</span><strong>Non-GMO</strong></div>
  <div class="pbar-item"><span>🛡️</span><strong>60-Day Guarantee</strong></div>
  <div class="pbar-item"><span>⭐</span><strong>19,479 Reviews</strong></div>
  <div class="pbar-item"><span>🚚</span><strong>Free US Shipping</strong></div>
</div>
<div class="chat-area" id="chat"></div>
<div class="quick-replies">
  <button class="qr-btn" onclick="sendQuick('What is PrimeBiome?')">What is PrimeBiome?</button>
  <button class="qr-btn" onclick="sendQuick('What are the ingredients?')">Ingredients</button>
  <button class="qr-btn" onclick="sendQuick('How much does it cost?')">Pricing</button>
  <button class="qr-btn" onclick="sendQuick('Does it really work?')">Does it work?</button>
  <button class="qr-btn" onclick="sendQuick('What are the benefits?')">Benefits</button>
</div>
<div class="input-area">
  <div class="input-wrap">
    <textarea id="user-input" placeholder="Ask me anything about PrimeBiome..." rows="1"></textarea>
  </div>
  <button class="send-btn" id="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>
<script>
const GROQ_API_KEY = "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";
const AFFILIATE_LINK = "https://bit.ly/3NbSfJ6";
const SYSTEM_PROMPT = `You are Alex, a friendly health & wellness sales specialist for PrimeBiome.

PRODUCT: PrimeBiome — probiotic gummy (1/day) for skin-gut health
BENEFITS: Youthful skin, digestive support, healthy weight, dermal balance
INGREDIENTS: B. Coagulans, Babchi, Dandelion, Fennel, Inulin, Fenugreek, Lemon Balm, Organic Ceylon Ginger, Organic Lion's Mane, Slippery Elm Bark
CERTIFICATIONS: Natural, Non-GMO, No Stimulants, 19479+ reviews, 60-day money-back guarantee

PRICING:
- 2 bottles: $79/bottle = $158 + $9.99 shipping
- 3 bottles: $69/bottle = $207 FREE shipping (Most Popular)
- 6 bottles: $49/bottle = $294 FREE shipping + 3 free e-books (BEST VALUE)

AFFILIATE LINK: ${AFFILIATE_LINK}

RULES: Be warm & persuasive, not pushy. Recommend 6-bottle pack. Always include affiliate link when discussing purchase. English only. Max 3 paragraphs. Use 60-day guarantee to handle objections. No false medical claims.`;

let conversationHistory = [];
let isTyping = false;

function addMessage(role, html) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const av = document.createElement('div');
  av.className = `msg-avatar ${role==='agent'?'agent-av':'user-av'}`;
  av.textContent = role==='agent'?'🌿':'👤';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html;
  div.appendChild(av);
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'message agent';
  div.id = 'typing-indicator';
  const av = document.createElement('div');
  av.className = 'msg-avatar agent-av';
  av.textContent = '🌿';
  const t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  div.appendChild(av);
  div.appendChild(t);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if(t) t.remove();
}

function sendQuick(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

async function sendMessage() {
  if(isTyping) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  conversationHistory.push({role:'user', content:text});
  isTyping = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${GROQ_API_KEY}`},
      body: JSON.stringify({
        model:'llama-3.3-70b-versatile',
        max_tokens:400,
        messages:[{role:'system',content:SYSTEM_PROMPT},...conversationHistory]
      })
    });
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || "Please try again!";
    conversationHistory.push({role:'assistant',content:reply});
    removeTyping();
    let fmt = reply
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.*?)\*/g,'<em>$1</em>')
      .replace(new RegExp(AFFILIATE_LINK.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),`<a href="${AFFILIATE_LINK}" target="_blank">👉 Get PrimeBiome Now</a>`)
      .replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
    addMessage('agent', fmt);
  } catch(e) {
    removeTyping();
    addMessage('agent',"I'm having a moment — please try again! 😊");
  }
  isTyping = false;
  document.getElementById('send-btn').disabled = false;
}

document.getElementById('user-input').addEventListener('input', function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,100)+'px';
});
document.getElementById('user-input').addEventListener('keydown', function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
});

window.onload = () => {
  setTimeout(()=>{
    addMessage('agent',`Hi there! 👋 I'm Alex, your PrimeBiome wellness specialist.<br><br>I'm here to help you discover <strong>PrimeBiome</strong> — the probiotic gummy that's transforming the way people care for their skin and gut health from the inside out.<br><br>Whether you're curious about the ingredients, benefits, or pricing — I've got all the answers. What would you like to know? 🌿`);
    conversationHistory.push({role:'assistant',content:"Hi! I'm Alex, your PrimeBiome specialist. What would you like to know?"});
  },500);
};
</script>
</body>
</html>
